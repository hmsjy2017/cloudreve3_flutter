name: Android Preview APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FLUTTER_CHANNEL: stable
  APK_ARTIFACT_NAME: cloudreve-android-preview-apk
  ANDROID_NDK_VERSION: 27.0.12077973

jobs:
  build-preview-apk:
    name: Build preview APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Cache Cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock', 'native/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build Rust sync core for Android
        working-directory: native
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -t x86_64 \
            -o ../android/app/src/main/jniLibs \
            build --release -p sync-core --features android-media

      - name: Build preview APK
        run: flutter build apk --debug

      - name: Collect APK artifacts
        run: |
          mkdir -p dist/android-preview
          find build/app/outputs -type f -name "*.apk" -print -exec cp {} dist/android-preview/ \;
          ls -lah dist/android-preview

      - name: Upload preview APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_ARTIFACT_NAME }}
          path: dist/android-preview/*.apk
          if-no-files-found: error
          retention-days: 14
